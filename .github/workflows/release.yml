# Release pipeline for the RSL Companion Account Data Extractor.
#
# Trigger: push a tag like v1.2.0 (or run manually with a version input).
# Output:  a GitHub Release with the versioned installer + its SHA-256 checksum.
#
# The stable download URL (get.rslcompanion.com/RslCompanionAccountDataExtractor-Setup.exe)
# should redirect to the versioned asset of the latest release.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.2.0)"
        required: true

permissions:
  contents: write # create the GitHub Release
  id-token: write # required to mint the build-provenance attestation
  attestations: write # publish the build-provenance attestation

jobs:
  release:
    runs-on: windows-latest

    steps:
      # EXTRACTION_REPO_TOKEN: fine-grained PAT with read access to the private
      # RslCompanionExtraction repo, so the extraction/ submodule can be fetched. Official
      # releases must include the engine; without this secret the build would silently
      # produce an upload-only binary.
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.EXTRACTION_REPO_TOKEN }}

      - name: Ensure extraction engine is present
        shell: pwsh
        run: |
          if (-not (Test-Path "extraction\RslCompanion.Extraction.csproj")) {
            throw "extraction/ submodule missing — check EXTRACTION_REPO_TOKEN."
          }

      - name: Derive version
        id: ver
        shell: pwsh
        run: |
          $v = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            '${{ inputs.version }}'
          } else {
            '${{ github.ref_name }}'.TrimStart('v')
          }
          if ($v -notmatch '^\d+\.\d+\.\d+$') { throw "Version '$v' is not in X.Y.Z form." }
          "version=$v" >> $env:GITHUB_OUTPUT

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish self-contained build
        shell: pwsh
        # Multi-file self-contained (no PublishSingleFile): Inno packs the whole folder anyway, and
        # avoiding the single-file self-extraction-to-temp pattern reduces AV "dropper" heuristic
        # flags and speeds startup.
        run: >
          dotnet publish RslCompanionUploader.csproj -c Release -r win-x64 --self-contained true
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish\win-x64

      # Whether code signing runs is gated on the Azure Trusted Signing secrets being configured, so
      # releases still build (unsigned) until a signing identity exists.
      - name: Check signing config
        id: signcfg
        shell: pwsh
        run: |
          $enabled = -not [string]::IsNullOrEmpty('${{ secrets.AZURE_CLIENT_ID }}')
          "enabled=$enabled" >> $env:GITHUB_OUTPUT
          Write-Host "Code signing enabled: $enabled"

      # Sign the app exe BEFORE Inno packs it, so antivirus scanning the installed/extracted exe
      # sees a valid signature.
      - name: Sign application exe
        if: steps.signcfg.outputs.enabled == 'True'
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.TRUSTED_SIGNING_PROFILE }}
          files: |
            ${{ github.workspace }}\publish\win-x64\RslCompanionUploader.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Compile installer
        shell: pwsh
        run: |
          # Inno Setup 6 is preinstalled on GitHub's Windows runner images; install it if missing.
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress; }
          & $iscc /DMyAppVersion=${{ steps.ver.outputs.version }} installer\setup.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

      # Sign the finished installer — this is the file SmartScreen checks on download. Must run
      # BEFORE the checksum step so the published SHA-256 matches the signed binary users receive.
      - name: Sign installer
        if: steps.signcfg.outputs.enabled == 'True'
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.TRUSTED_SIGNING_PROFILE }}
          files: |
            ${{ github.workspace }}\installer\dist\RslCompanionAccountDataExtractor-Setup.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Version the artifact and generate SHA-256 checksum
        id: art
        shell: pwsh
        run: |
          $version = '${{ steps.ver.outputs.version }}'
          $name = "RslCompanionAccountDataExtractor-Setup-$version.exe"
          Move-Item "installer\dist\RslCompanionAccountDataExtractor-Setup.exe" "installer\dist\$name"

          $hash = (Get-FileHash "installer\dist\$name" -Algorithm SHA256).Hash.ToLower()
          # sha256sum-compatible format so users can verify with any standard tool.
          "$hash *$name" | Out-File -Encoding ascii "installer\dist\$name.sha256"

          # Stable, unversioned copy so get.rslcompanion.com can redirect to GitHub's
          # built-in /releases/latest/download/<name> URL instead of a Cloudflare Worker.
          $stableName = "RslCompanionAccountDataExtractor-Setup.exe"
          Copy-Item "installer\dist\$name" "installer\dist\$stableName"
          "$hash *$stableName" | Out-File -Encoding ascii "installer\dist\$stableName.sha256"

          "sha256=$hash" >> $env:GITHUB_OUTPUT
          Get-Content "installer\dist\$name.sha256"

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: installer/dist/RslCompanionAccountDataExtractor-Setup-*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            installer/dist/RslCompanionAccountDataExtractor-Setup-*.exe
            installer/dist/RslCompanionAccountDataExtractor-Setup.exe
            installer/dist/*.sha256
          body: |
            **SHA-256:** `${{ steps.art.outputs.sha256 }}`

            Verify your download (PowerShell):
            ```
            Get-FileHash RslCompanionAccountDataExtractor-Setup-${{ steps.ver.outputs.version }}.exe -Algorithm SHA256
            ```

            **Verify this build came from this repo's source** (requires the [GitHub CLI](https://cli.github.com)):
            ```
            gh attestation verify RslCompanionAccountDataExtractor-Setup-${{ steps.ver.outputs.version }}.exe -R rslcompanion/RslCompanionUploader
            ```
            This checks a signed attestation tying the exe's hash to this exact GitHub Actions run and commit — proof the binary wasn't tampered with after the build, even though the extraction engine's source is private.
